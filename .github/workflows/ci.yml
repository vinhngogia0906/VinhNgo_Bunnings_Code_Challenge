name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: backend (.NET) build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/BunningsSizzlingHotProducts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test.trx" --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Install ReportGenerator
          run: dotnet tool install -g dotnet-reportgenerator-globaltool
      
      - name: Generate coverage report
          run: |
            reportgenerator \
              -reports:"./TestResults/**/coverage.cobertura.xml" \
              -targetdir:"./TestResults/CoverageReport" \
              -reporttypes:"HtmlInline;MarkdownSummaryGithub;Cobertura"

      - name: Add coverage to job summary
          run: cat ./TestResults/CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: '**/TestResults/*.trx'

      - name: Upload code coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-code-coverage
          path: ./TestResults/CoverageReport