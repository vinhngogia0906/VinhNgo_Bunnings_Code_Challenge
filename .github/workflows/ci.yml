name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: backend (.NET) build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/BunningsSizzlingHotProducts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test.trx" --collect:"XPlat Code Coverage" --settings ../../coverlet.runsettings --results-directory TestResults

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:"./TestResults/CoverageReport" \
            -reporttypes:"HtmlInline;MarkdownSummaryGithub;Cobertura"

      - name: Add coverage to job summary
        run: cat ./TestResults/CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: '**/TestResults/*.trx'

      - name: Upload code coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-code-coverage
          path: ./TestResults/CoverageReport

  frontend-unit:
    name: frontend unit tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/bunnings-sizzling-hot-products-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/bunnings-sizzling-hot-products-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Production build (sanity)
        run: npm run build

  frontend-e2e:
    name: frontend e2e tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend-unit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/bunnings-sizzling-hot-products-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/bunnings-sizzling-hot-products-ui
        run: npm ci

      - name: Install Playwright browsers (chromium only)
        working-directory: src/bunnings-sizzling-hot-products-ui
        run: npx playwright install --with-deps chromium

      - name: Bring up the docker compose stack
        run: docker compose up -d --build --wait

      - name: Wait for the frontend to respond
        # `--wait` only proves containers started; we also poll until nginx is
        # answering 200s so Playwright doesn't race a still-warming-up backend.
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost/ >/dev/null && \
               curl -sSf "http://localhost/api/top-product/daily?date=2026-04-23" >/dev/null; then
              echo "Stack is ready."
              exit 0
            fi
            echo "Waiting for stack... ($i)"
            sleep 2
          done
          echo "Stack failed to come up." >&2
          docker compose logs --no-color
          exit 1

      - name: Run Playwright tests
        working-directory: src/bunnings-sizzling-hot-products-ui
        env:
          PLAYWRIGHT_BASE_URL: http://localhost
          CI: 'true'
        run: npx playwright test --reporter=html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/bunnings-sizzling-hot-products-ui/playwright-report
          retention-days: 7

      - name: Capture container logs on failure
        if: failure()
        run: docker compose logs --no-color > docker-compose-logs.txt

      - name: Upload docker logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: docker-compose-logs.txt
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose down -v
