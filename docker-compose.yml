services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sizzling
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sizzling"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: src/BunningsSizzlingHotProducts/BunningsSizzlingHotProducts.Api/Dockerfile
    environment:
      Seeding__InputsPath: /app/inputs
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=sizzling;Username=postgres;Password=postgres"
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - ./inputs:/app/inputs:ro
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./src/bunnings-sizzling-hot-products-ui
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"
      
volumes:
  pgdata: